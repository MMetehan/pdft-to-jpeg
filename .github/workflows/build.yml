name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download and extract poppler
        run: |
          Invoke-WebRequest -Uri "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.08.0-0/Release-24.08.0-0.zip" -OutFile poppler.zip
          Expand-Archive poppler.zip -DestinationPath poppler
          Copy-Item -Path "poppler\poppler-24.08.0\Library\bin" -Destination "poppler_bin" -Recurse

      - name: Install dependencies
        run: pip install pdf2image pillow pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --name pdf_to_jpeg --add-binary "poppler_bin;poppler_bin" pdf_to_jpeg.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf_to_jpeg_windows
          path: dist/pdf_to_jpeg.exe
